    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
      }

      .ad {
        position: fixed;
        z-index: 9999;

        display: grid;
        place-items: center;

        min-width: 300px;
        min-height: 170px;
        padding: 12px;

        border: 4px outset #eeeeee;
        background-color: yellow;
        color: red;

        font-family: Arial, sans-serif;
        font-size: 20px;
        font-weight: bold;
        text-align: center;

        cursor: pointer;
        user-select: none;

        box-shadow: 5px 5px 0 rgb(0 0 0 / 50%);
      }

      .ad::after {
        content: "click here!!!";
        display: block;

        color: blue;
        font-size: 12px;
      }
    </style>

  <body>
    <h1></h1>

    <h3>top 5 miracles</h3>
    <h4>you wouldn't believe this</h4>

    <div class="ad" id="firstAd">YOU WON!!!</div>

    <script src="sketch.js"></script>

    <!-- pop up add section -->

    <script>
      const firstAd = document.querySelector("#firstAd");

      let mouseX = window.innerWidth / 2;
      let mouseY = window.innerHeight / 2;

      const messages = [
        "YOU WON!!!",
        "FREE MONEY",
        "CLICK MEEE sTINCKY:P",
        "1,000,001st VISITOR",
        "YOUR COMPUTER IS SLOW BOO tomato",
        "MY MATE PAUL BET ON HORSES NOW HE'S A MILLIONAIRE ",
        "CLAIM YOUR PRIZE TODAY YEA",
      ];

      function randomBetween(min, max) {
        return Math.random() * (max - min) + min;
      }

      function keepInsideScreen(element, x, y) {
        const maxX = Math.max(0, window.innerWidth - element.offsetWidth);

        const maxY = Math.max(0, window.innerHeight - element.offsetHeight);

        return {
          x: Math.max(0, Math.min(x, maxX)),
          y: Math.max(0, Math.min(y, maxY)),
        };
      }

      function createAd() {
        const ad = document.createElement("div");

        ad.className = "ad";

        const width = randomBetween(250, 420);
        const height = randomBetween(210, 320);

        ad.style.width = `${width}px`;
        ad.style.height = `${height}px`;
        ad.style.fontSize = `${randomBetween(14, 32)}px`;

        ad.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 60%)`;

        ad.style.transform = `rotate(${randomBetween(-8, 8)}deg)`;

        ad.textContent = messages[Math.floor(Math.random() * messages.length)];

        document.body.appendChild(ad);

        const adCount = document.querySelectorAll(".ad").length;

        if (adCount >= 10) {
          window.location.href = "../../sleepy chatbot/index.html";
          return;
        }

        const position = keepInsideScreen(
          ad,
          randomBetween(0, window.innerWidth - width),
          randomBetween(0, window.innerHeight - height),
        );

        ad.style.left = `${position.x}px`;
        ad.style.top = `${position.y}px`;
      }

      function multiplyAds() {
        createAd();
        createAd();
      }

      document.addEventListener("click", (event) => {
        if (event.target.closest(".ad")) {
          multiplyAds();
        }
      });

      document.addEventListener("mousemove", (event) => {
        mouseX = event.clientX;
        mouseY = event.clientY;
      });

      function followCursor() {
        const position = keepInsideScreen(
          firstAd,
          mouseX - firstAd.offsetWidth / 4,
          mouseY - firstAd.offsetHeight / 4,
        );

        firstAd.style.left = `${position.x}px`;
        firstAd.style.top = `${position.y}px`;

        requestAnimationFrame(followCursor);
      }

      followCursor();
    </script>
  </body>
